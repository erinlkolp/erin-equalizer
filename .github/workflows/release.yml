name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfreetype-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libcurl4-openssl-dev

      - name: Configure (macOS universal)
        if: matrix.name == 'macos'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Configure
        if: matrix.name != 'macos'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target ErinEqualizer_VST3

      - name: Package (Linux)
        if: matrix.name == 'linux'
        run: |
          cd build/ErinEqualizer_artefacts/Release/VST3
          tar czf "$GITHUB_WORKSPACE/ErinEqualizer-${{ github.event.release.tag_name }}-linux.tar.gz" "Erin Equalizer.vst3"

      - name: Package (macOS)
        if: matrix.name == 'macos'
        run: |
          cd build/ErinEqualizer_artefacts/Release/VST3
          zip -r "$GITHUB_WORKSPACE/ErinEqualizer-${{ github.event.release.tag_name }}-macos.zip" "Erin Equalizer.vst3"

      - name: Package (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "build\ErinEqualizer_artefacts\Release\VST3\Erin Equalizer.vst3" -DestinationPath "ErinEqualizer-${{ github.event.release.tag_name }}-windows.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ErinEqualizer-${{ github.event.release.tag_name }}-*
